
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
        :root {
            --bg: #0d0d0d;
            --card: #161616;
            --border: #2a2a2a;
            --accent: #00e5a0;
            --accent2: #005c40;
            --text: #f0f0f0;
            --muted: #666;
            --error: #ff4d4d;
        }
 
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
 
        /* animated bg */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, #00e5a020 0%, transparent 70%);
            top: -100px; left: -100px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00e5a015 0%, transparent 70%);
            bottom: -80px; right: -80px;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite reverse;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(40px, 40px); }
        }
 
        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 380px;
            padding: 40px 36px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 60px #00e5a010;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
 
        /* Tab switcher */
        .tabs {
            display: flex;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 32px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
 
        /* Forms */
        .form { display: none; flex-direction: column; gap: 16px; }
        .form.active { display: flex; }
 
        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }
 
        label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }
 
        .field { display: flex; flex-direction: column; gap: 6px; }
 
        input {
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: #444; }
 
        .btn {
            margin-top: 8px;
            padding: 13px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:active { transform: scale(0.98); }
 
        .msg {
            font-size: 13px;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .msg.success { background: #00e5a015; color: var(--accent); display: block; }
        .msg.error   { background: #ff4d4d15; color: var(--error);  display: block; }
    </style>
</head>
<body>
 
<div class="container">
    <!-- Tab buttons -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
    </div>
 
    <!-- LOGIN FORM -->
    <div class="form active" id="loginForm">
        <h2>Welcome back 👋</h2>
        <p class="subtitle">Login to continue chatting</p>
 
        <div class="field">
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input id="loginPassword" type="password" placeholder="••••••••">
        </div>
 
        <button class="btn" onclick="login()">Login →</button>
        <div class="msg" id="loginMsg"></div>
    </div>
 
    <!-- SIGNUP FORM -->
    <div class="form" id="signupForm">
        <h2>Create account ✨</h2>
        <p class="subtitle">Join and start chatting</p>
 
        <div class="field">
            <label>Name</label>
            <input id="signupName" type="text" placeholder="Your name">
        </div>

        <div class="field">
            <label>Email</label>
            <input id="signupEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input id="signupPassword" type="password" placeholder="••••••••">
        </div>
 
        <button class="btn" onclick="signup()">Create Account →</button>
        <div class="msg" id="signupMsg"></div>
    </div>
</div>
 <script src="/socket.io/socket.io.js"> </script>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
        });
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }
 
    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + type;
    }
 
    async function login() {
        const email    = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
 
        if (!email || !password) return  showMsg('loginMsg', 'Fill in all fields!', 'error')
 
        try {
            const res  = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
             console.log("server response:", data);
            if (data.success) {          //  check success
           // const name = data.replace("Welcome Back , ", "");
            sessionStorage.clear();
            sessionStorage.setItem("userId", data.userId); //objectID kabatti idhi local storage lo store cheste object object ga store aidhi so,vitini use chesina daggara string ga convert chesukovali
            sessionStorage.setItem("chatuser", data.name); //  save name //saving yserID
            sessionStorage.setItem("token", data.token);
           // const token = sessionStorage.getItem("token");
               /*   if(!token){
                        window.location.href = "/";
                     } */
                     window.location.href = "/chat.html";         // redirect to another html
        } else {
            showMsg('loginMsg', data.msg, 'error');
        }
     } catch (err) {
            showMsg('loginMsg', 'Server not reachable!', 'error');
        }
    }

 
    async function signup() {
        const name     = document.getElementById('signupName').value;
        const email    = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
 
        if (!name || !email || !password) return showMsg('signupMsg', 'Fill in all fields!', 'error');
 
        try {
            const res  = await fetch('http://localhost:3000/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.text();
            showMsg('signupMsg', data, 'success');
        } catch (err) {
            showMsg('signupMsg', 'Server not reachable!', 'error');
        }
    }
</script>
 
</body>
</html>
