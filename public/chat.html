<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --card: #161616;
            --border: #2a2a2a;
            --accent: #00e5a0;
            --accent2: #005c40;
            --text: #f0f0f0;
            --muted: #666;
            --error: #ff4d4d;
            --sidebar-w: 280px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 56px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }
        .topbar-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 1px;
        }
        .topbar-logo span { color: var(--text); }
        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-user {
            font-size: 13px;
            color: var(--muted);
        }
        .topbar-user strong { color: var(--text); }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--error); color: var(--error); }

        /* ── MAIN LAYOUT ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .search-box {
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            width: 100%;
            outline: none;
            transition: border 0.2s;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: #444; }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .contacts-list::-webkit-scrollbar { width: 4px; }
        .contacts-list::-webkit-scrollbar-track { background: transparent; }
        .contacts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .contact-item:hover { background: #1e1e1e; }
        .contact-item.active {
            background: #00e5a012;
            border: 1px solid #00e5a025;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: #000;
            flex-shrink: 0;
            position: relative;
        }
        .online-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--card);
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-preview {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .contact-time {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .unread-badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ── CHAT WINDOW ── */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
        }

        /* empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
        }
        .empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }
        .empty-state p {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
        }
        .empty-state span { font-size: 13px; }

        /* chat active state */
        .chat-active { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-active.visible { display: flex; }

        .chat-topbar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            flex-shrink: 0;
        }
        .chat-topbar .avatar { width: 36px; height: 36px; font-size: 13px; border-radius: 10px; }
        .chat-topbar-info { flex: 1; }
        .chat-topbar-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
        }
        .chat-topbar-status {
            font-size: 12px;
            color: var(--accent);
        }

        /* messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.2s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row.sent { flex-direction: row-reverse; }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-row.received .msg-bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }
        .msg-row.sent .msg-bubble {
            background: var(--accent);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }
        .msg-time {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 2px;
            flex-shrink: 0;
        }

        /* date divider */
        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-divider::before, .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* input area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            flex-shrink: 0;
        }
        .msg-input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            resize: none;
        }
        .msg-input:focus { border-color: var(--accent); }
        .msg-input::placeholder { color: #444; }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:active { transform: scale(0.95); }
        .send-btn svg { width: 18px; height: 18px; fill: #000; }

        /* loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 8px;
            height: 40px;
            margin-bottom: 6px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-logo">chat<span>.</span>io</div>
    <div class="topbar-right">
        <span class="topbar-user">Hey, <strong id="loggedInUser"></strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Contacts</div>
            <input class="search-box" type="text" placeholder="Search users..." oninput="filterContacts(this.value)">
        </div>
        <div class="contacts-list" id="contactsList">
            <!-- skeletons while loading -->
            <div class="skeleton"></div>
            <div class="skeleton" style="opacity:0.7"></div>
            <div class="skeleton" style="opacity:0.4"></div>
        </div>
    </div>

    <!-- CHAT WINDOW -->
    <div class="chat-window">

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💬</div>
            <p>No chat selected</p>
            <span>Pick a contact from the sidebar to start chatting</span>
        </div>

        <!-- Active chat -->
        <div class="chat-active" id="chatActive">
            <div class="chat-topbar">
                <div class="avatar" id="chatAvatar">A</div>
                <div class="chat-topbar-info">
                    <div class="chat-topbar-name" id="chatName">Name</div>
                    <div class="chat-topbar-status" id="chatStatus">● Online</div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="date-divider">Today</div>
                <!-- messages injected here -->
            </div>

            <div class="input-area">
                <input class="msg-input" id="msgInput" type="text" placeholder="Type a message..." onkeydown="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>
</div>
<script>
const token = sessionStorage.getItem("token");

if(!token){
    window.location.href = "/";
}
</script>

<script src="/socket.io/socket.io.js"></script>

<script>
    // ── Socket connection ──
    const socket = io("http://localhost:3000");

    socket.on("connect", () => {
       // console.log("🟢 connected:", socket.id);
        const userId=sessionStorage.getItem("userId");
        socket.emit("register" , userId) //idhi server lo recieve cheskuntam

       // console.log(userId);
    });

    socket.on("chat message", (data) => {
  //   console.log("data.senderID:  ", JSON.stringify(data.senderID))
   // console.log("activeUser._id: ", JSON.stringify(activeUser?._id))
   //  console.log("match?", data.senderID === activeUser?._id)
   console.log("recieved data" ,data)
        if (data.senderID === activeUser?._id) {
             console.log("MATCH! appending...") 
            appendMessage(data.text, "received");
        }
        
        
    });

    // ── State ──
    let allUsers = [];
    let activeUser = null;
    const loggedInName = sessionStorage.getItem("chatuser") ;
    document.getElementById("loggedInUser").textContent = loggedInName;

    // ── Load users from backend ──
    async function loadUsers() {
        try {
          const res = await fetch("/users", {
    headers: { "authorization": "bearer " + token }
});
            const users = await res.json();
            //console.log( loggedInName)
            const filteredusers=users.filter(user =>{
              return  user.name!==loggedInName
            });
         //   console.log("users" , users);
            //console.log(filteredusers);
            allUsers = filteredusers;
            renderContacts(filteredusers);
        } catch (err) {
            document.getElementById("contactsList").innerHTML =
                `<p style="color:var(--muted);font-size:13px;padding:16px">Could not load users</p>`;
        }
    }

    // ── Render contacts ──
    function renderContacts(filteredusers) {
        const list = document.getElementById("contactsList");
        if (!filteredusers.length) {
            list.innerHTML = `<p >No users found</p>`;
            return;
        }
        list.innerHTML = filteredusers.map(u => `
            <div class="contact-item" id="contact-${u._id}" onclick="openChat('${u._id}', '${u.name}', '${u.email}')">
                <div class="avatar"> 
                    ${u.name.charAt(0).toUpperCase()}
                    <div class="online-dot"></div>
                </div>
                <div class="contact-info">
                    <div class="contact-name">${u.name}</div>
                  
                </div>
            </div>
        `).join('');
    }

    // ── Filter contacts ──
    function filterContacts(query) {
        const filtered = allUsers.filter(u =>
            u.name.toLowerCase().includes(query.toLowerCase()) ||
            u.email.toLowerCase().includes(query.toLowerCase())
        );
        renderContacts(filtered);
    }

    // ── Open chat ──
    function openChat(id, name, email) {
        // update active styling
        document.querySelectorAll(".contact-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`contact-${id}`)?.classList.add("active");

        activeUser = { _id: id, name, email }; 

        // update chat topbar
        document.getElementById("chatAvatar").textContent = name.charAt(0).toUpperCase();
        document.getElementById("chatName").textContent = name;
        document.getElementById("chatStatus").textContent = "● Online";

        // show chat, hide empty state
        document.getElementById("emptyState").style.display = "none";
        document.getElementById("chatActive").classList.add("visible");

        // clear messages and load history
        document.getElementById("messagesArea").innerHTML = `<div class="date-divider">Today</div>`;
        loadMessages(id);

        document.getElementById("msgInput").focus();
    }

    // ── Load message history ──
   async function loadMessages(otherId) {
    const myId = sessionStorage.getItem("userId");
    const res = await fetch(`/messages?me=${myId}&with=${otherId}`, {
    headers: { "authorization": "bearer " + token }
});
    const msgs = await res.json();
    msgs.forEach(m => {
        appendMessage(m.text, m.senderID === myId ? "sent" : "received");
    });
}

    // ── Append a message bubble ──
    function appendMessage(text, type) {
        const area = document.getElementById("messagesArea");
        const div = document.createElement("div");
        div.className = `msg-row ${type}`;
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `
            <span class="msg-time">${now}</span>
            <div class="msg-bubble">${text}</div>
        `;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // ── Send message ──
    function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text || !activeUser) return;
    //    console.log("activeUser at send time:", activeUser._id); 
 const senderID = sessionStorage.getItem("userId");
        // show in UI
        appendMessage(text, "sent");
     //  const senderID = sessionStorage.getItem("userId");
     // console.log(senderID)
        // emit to server
        socket.emit("chat message", {
           senderID: senderID,
           ReceiverID: activeUser._id, //activeuser means clicked user simple he is a reciever
           text:text
        });
        input.value = "";
    }

    // ── Enter key to send ──
    function handleKey(e) {
        if (e.key === "Enter") sendMessage();
    }

    // ── Logout ──
    function logout() {
        sessionStorage.removeItem("userId");
        window.location.href = "/";
    }

    // ── Init ──
    loadUsers();
</script>
</body>
</html>
